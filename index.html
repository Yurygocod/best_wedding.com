<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Навигатор Ориентировщика PRO + Zoom</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #111;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        #controls {
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95);
            padding: 12px;
            z-index: 10;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border-bottom: 1px solid #334155;
        }
        .row { display: flex; gap: 8px; width: 100%; }
        button, label.btn {
            flex: 1;
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        button:active, label.btn:active { background: #1d4ed8; }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        input[type="file"] { display: none; }
        
        #status {
            background: rgba(30, 41, 59, 0.7);
            padding: 8px;
            border-radius: 4px;
            line-height: 1.4;
            border-left: 4px solid #3b82f6;
        }

        /* Контейнер-вьевер, который обрезает карту по экрану */
        #viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1e1e1e;
        }

        /* Интерактивная рабочая область, которую мы будем зумить и двигать */
        #pan-zoom-layer {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            will-change: transform;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        #map-img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }
        #track-canvas {
            position: absolute;
            pointer-events: none;
            z-index: 4;
        }
        #user-marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #ef4444;
            border: 3px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 5;
            box-shadow: 0 0 12px rgba(0,0,0,0.7);
        }
        #user-marker::after {
            content: '';
            position: absolute;
            top: -14px; left: 6px;
            width: 0; height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 12px solid #ef4444;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="row">
            <label class="btn" for="file-input">📸 Загрузить карту</label>
            <input type="file" id="file-input" accept="image/*">
            <button id="btn-north" disabled>🧭 Задать Север</button>
        </div>
        <div class="row">
            <button id="btn-scale" disabled>📏 Масштаб (100м)</button>
            <button id="btn-start" disabled>🚩 Старт</button>
        </div>
        <div id="status"><b>Шаг 1:</b> Загрузите изображение карты. Двигать и приближать карту можно в любой момент двумя пальцами.</div>
    </div>

    <div id="viewport">
        <div id="pan-zoom-layer">
            <img id="map-img" src="" alt="" style="display: none;">
            <canvas id="track-canvas"></canvas>
            <div id="user-marker"></div>
        </div>
    </div>

<script>
    let mapImage = document.getElementById('map-img');
    let canvas = document.getElementById('track-canvas');
    let ctx = canvas.getContext('2d');
    let marker = document.getElementById('user-marker');
    let statusText = document.getElementById('status');
    let transformLayer = document.getElementById('pan-zoom-layer');
    let viewport = document.getElementById('viewport');

    let appState = "INIT"; 
    
    // Переменные калибровки и логов
    let northAzimuth = 0;      
    let scaleImgPixelsPerMeter = 0; 
    let scaleFirstPoint = null;  
    let startGPS = null;       
    let startImgPixels = null;    
    let currentImgPixels = {x: 0, y: 0};
    let trackLogImg = []; 
    let totalDistance = 0;      
    let lastGPS = null;
    let currentHeading = 0;

    // Сглаживание GPS
    let filteredLat = null;
    let filteredLon = null;
    const FILTER_FACTOR = 0.3;

    // Переменные трансформации (Зум и Панорамирование)
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let startPanX = 0, startPanY = 0;
    let startTouchX = 0, startTouchY = 0;
    let startTouchDist = 0;

    // Обновление CSS-трансформации сцены
    function applyTransform() {
        transformLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    }

    // --- УПРАВЛЕНИЕ ЗУМОМ И ПЕРЕМЕЩЕНИЕМ ---
    // Колесо мыши (для ПК)
    viewport.addEventListener('wheel', (e) => {
        if (mapImage.style.display === "none") return;
        e.preventDefault();
        const zoomFactor = 1.1;
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        // Зум относительно курсора мыши
        const innerX = (mouseX - panX) / zoom;
        const innerY = (mouseY - panY) / zoom;

        if (e.deltaY < 0) {
            zoom = Math.min(zoom * zoomFactor, 8);
        } else {
            zoom = Math.max(zoom / zoomFactor, 0.5);
        }

        panX = mouseX - innerX * zoom;
        panY = mouseY - innerY * zoom;
        applyTransform();
    }, { passive: false });

    // Тач-события (для смартфонов: скролл одним пальцем, зум двумя)
    viewport.addEventListener('touchstart', (e) => {
        if (mapImage.style.display === "none") return;
        
        if (e.touches.length === 1) {
            // Начало перетаскивания
            isDragging = true;
            startTouchX = e.touches[0].clientX;
            startTouchY = e.touches[0].clientY;
            startPanX = panX;
            startPanY = panY;
        } else if (e.touches.length === 2) {
            // Начало Pinch-to-zoom
            isDragging = false;
            startTouchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            // Центр между двумя пальцами
            const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            this.innerTouchX = (centerX - panX) / zoom;
            this.innerTouchY = (centerY - panY) / zoom;
            this.startZoom = zoom;
        }
    });

    viewport.addEventListener('touchmove', (e) => {
        if (mapImage.style.display === "none") return;
        e.preventDefault();

        if (isDragging && e.touches.length === 1) {
            const dx = e.touches[0].clientX - startTouchX;
            const dy = e.touches[0].clientY - startTouchY;
            panX = startPanX + dx;
            panY = startPanY + dy;
            applyTransform();
        } else if (e.touches.length === 2) {
            const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            const factor = dist / startTouchDist;
            zoom = Math.max(0.5, Math.min(this.startZoom * factor, 8));

            const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

            panX = centerX - this.innerTouchX * zoom;
            panY = centerY - this.innerTouchY * zoom;
            applyTransform();
        }
    }, { passive: false });

    viewport.addEventListener('touchend', (e) => {
        isDragging = false;
    });

    // --- РАСЧЕТ КООРДИНАТ С УЧЕТОМ ЗУМА ---
    function getLayerCoords(clientX, clientY) {
        // Координаты внутри слоя pan-zoom-layer БЕЗ учета CSS scale/translate
        let rect = transformLayer.getBoundingClientRect();
        return {
            x: (clientX - rect.left) / zoom,
            y: (clientY - rect.top) / zoom
        };
    }

    function screenToImgCoords(layerX, layerY) {
        let rect = mapImage.getBoundingClientRect();
        let scaleX = mapImage.naturalWidth / (rect.width / zoom);
        let scaleY = mapImage.naturalHeight / (rect.height / zoom);
        
        let imgLeft = mapImage.offsetLeft;
        let imgTop = mapImage.offsetTop;

        return {
            x: (layerX - imgLeft) * scaleX,
            y: (layerY - imgTop) * scaleY
        };
    }

    function imgToLayerCoords(imgX, imgY) {
        let rect = mapImage.getBoundingClientRect();
        let scaleX = (rect.width / zoom) / mapImage.naturalWidth;
        let scaleY = (rect.height / zoom) / mapImage.naturalHeight;
        return {
            x: mapImage.offsetLeft + imgX * scaleX,
            y: mapImage.offsetTop + imgY * scaleY
        };
    }

    // --- ЗАГРУЗКА КАРТЫ ---
    document.getElementById('file-input').addEventListener('change', function(e) {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = function(event) {
            mapImage.src = event.target.result;
            mapImage.style.display = "block";
            mapImage.onload = function() {
                // Сброс зума при загрузке новой карты
                zoom = 1; panX = 0; panY = 0; applyTransform();
                resizeCanvas();
                appState = "WAIT_NORTH";
                statusText.innerHTML = "<b>Шаг 2:</b> Направьте верх телефона на СЕВЕР карты и нажмите «Задать Север».";
                document.getElementById('btn-north').disabled = false;
            }
        };
        reader.readAsDataURL(file);
    });

    window.addEventListener('resize', resizeCanvas);
    
    function resizeCanvas() {
        if (mapImage.style.display !== "none") {
            canvas.width = mapImage.clientWidth;
            canvas.height = mapImage.clientHeight;
            canvas.style.left = mapImage.offsetLeft + "px";
            canvas.style.top = mapImage.offsetTop + "px";
            updateMarkerPosition();
            redrawTrack();
        }
    }

    document.getElementById('btn-north').addEventListener('click', function() {
        if (app
