<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигатор Ориентировщика</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1b261e;
            color: #e2ebd9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #controls {
            background-color: #253329;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 10;
        }
        button, label {
            background-color: #3b5241;
            color: #fff;
            border: 1px solid #4e6b56;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
            display: inline-block;
            text-align: center;
        }
        button:hover, label:hover {
            background-color: #4a6651;
        }
        #mode-indicator {
            background-color: #1a241e;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #4e6b56;
            flex-grow: 1;
            text-align: center;
            font-size: 13px;
            min-width: 200px;
        }
        #map-container {
            position: relative;
            flex-grow: 1;
            overflow: auto;
            background-color: #121a15;
        }
        #mapWrapper {
            position: relative;
            display: inline-block;
        }
        #map-img {
            display: none;
            max-width: 100%; /* Картинка будет вписываться по ширине экрана смартфона */
            height: auto;
            user-select: none;
            -webkit-user-drag: none;
        }
        /* Стили маркеров */
        .marker {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
            z-index: 5;
            user-select: none;
        }
        .marker.user {
            background-color: #00bcd4;
            border: 2px solid white;
            color: white;
        }
        .marker.cp {
            background: linear-gradient(135deg, #ff5722 50%, #ffffff 50%);
            border: 2px solid #ff5722;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="controls">
        <label for="mapInput">📸 Загрузить карту</label>
        <input type="file" id="mapInput" accept="image/*" style="display: none;">

        <button id="btn-scale">📐 Масштаб (100м)</button>
        <button id="btn-cp-mode">🚩 Добавить КП</button>
        <button id="btn-start">🚀 Старт маршрута</button>

        <div id="mode-indicator">Режим: Просмотр. Загрузите карту, затем выберите нужную кнопку.</div>
    </div>

    <div id="map-container">
        <div id="mapWrapper">
            <img id="map-img" src="" alt="Карта не загружена">
        </div>
    </div>

    <script>
        const mapInput = document.getElementById('mapInput');
        const mapImg = document.getElementById('map-img');
        const mapWrapper = document.getElementById('mapWrapper');
        const modeIndicator = document.getElementById('mode-indicator');
        
        const btnScale = document.getElementById('btn-scale');
        const btnCpMode = document.getElementById('btn-cp-mode');
        const btnStart = document.getElementById('btn-start');

        let currentMode = 'view'; 
        let cpCount = 0;

        // Корректная загрузка файла карты
        mapInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    mapImg.src = event.target.result;
                    mapImg.style.display = 'block';
                    modeIndicator.innerText = "Карта загружена! Нажмите «Добавить КП» или «Масштаб».";
                };
                reader.readAsDataURL(file);
            }
        });

        // Переключение режимов (работают сразу)
        btnScale.addEventListener('click', () => {
            currentMode = 'scale';
            modeIndicator.innerText = "Режим: Калибровка. Отметьте на карте отрезок в 100 метров.";
        });

        btnCpMode.addEventListener('click', () => {
            currentMode = 'add-cp';
            modeIndicator.innerText = "Режим: Расстановка КП. Кликайте по карте, чтобы ставить точки.";
        });

        btnStart.addEventListener('click', () => {
            currentMode = 'navigation';
            modeIndicator.innerText = "Режим: Навигация запущена. Клик по карте установит ваше положение.";
        });

        // Обработчик клика по карте
        mapWrapper.addEventListener('click', function(e) {
            // Если картинка еще не выбрана пользователем, ничего не делаем
            if (!mapImg.src || mapImg.style.display === 'none') {
                alert("Сначала нажмите кнопку «Загрузить карту»!");
                return;
            }

            const rect = mapWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentMode === 'add-cp') {
                cpCount++;
                createMarker(x, y, cpCount, 'cp');
            } else if (currentMode === 'scale') {
                createMarker(x, y, "M", 'user');
                currentMode = 'view';
                modeIndicator.innerText = "Точка калибровки установлена.";
            } else if (currentMode === 'navigation') {
                // В режиме старта клик имитирует установку "Я здесь"
                createMarker(x, y, "Я", 'user');
            }
        });

        // Создание красивой метки
        function createMarker(x, y, text, type) {
            const marker = document.createElement('div');
            marker.className = `marker ${type}`;
            marker.style.left = `${x}px`;
            marker.style.top = `${y}px`;
            marker.innerText = text;

            // Удаление КП по клику на него
            if (type === 'cp') {
                marker.addEventListener('click', function(event) {
                    event.stopPropagation(); 
                    marker.remove();
                });
            }

            mapWrapper.appendChild(marker);
        }
    </script>
</body>
</html>
